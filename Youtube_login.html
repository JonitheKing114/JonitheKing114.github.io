<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Recovery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}


body{
height:100vh;
background:#f8f9fa;
display:flex;
align-items:center;
justify-content:center;
}


.container{

width:430px;
max-width:92%;
background:white;
padding:35px;
border-radius:18px;
border:1px solid #ddd;
box-shadow:0 8px 30px rgba(0,0,0,.15);

}


.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:180px;
    height:auto;
}


.logo span{

background:#ff0000;
color:white;
padding:8px 13px;
border-radius:12px;

}


h1,h2{

text-align:center;
margin-bottom:20px;

}


.subtitle{

text-align:center;
color:#666;
margin-bottom:25px;

}


label{

font-weight:bold;
color:#555;

}


input{

width:100%;
padding:14px;
margin:10px 0 18px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;

}


button{

width:100%;
padding:14px;
margin-top:12px;
border:0;
border-radius:10px;
background:#1a73e8;
color:white;
font-weight:bold;
font-size:16px;

}


button:hover{
opacity:.9;
}


.card{

padding:25px;
border-radius:15px;

}


.warning{

background:#fff8e1;
border-left:6px solid #f9a825;

}


.success{

background:#e8f5e9;
border-left:6px solid #2e7d32;

}


.danger{

background:#ffebee;
border-left:6px solid #c62828;

}


.status{

background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-top:20px;

}


.progress{

height:20px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:20px;

}


.bar{

height:100%;
width:0%;
background:#2e7d32;
transition:.3s;

}


.small{

color:#666;
font-size:14px;

}

</style>

</head>


<body>


<div id="app"></div>


<script>


const app=document.getElementById("app");



function loginPage(){


app.innerHTML=`

<div class="container">


<div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</div>


<h1>Anmeldung</h1>


<div class="subtitle">
Zugriff auf das Konto von Lehrer Schmidt
</div>


<label>E-Mail-Adresse</label>

<input value="lehrerschmidt3.141@gmail.com" readonly>


<label>Passwort</label>

<input id="pass" type="password"
placeholder="Passwort eingeben">


<button onclick="login()">
Weiter
</button>


</div>

`;

}



function login(){


let password=
document.getElementById("pass").value;


if(password==="FEOO4/+-"){


checking();


}

else{

alert("Falsches Passwort");

}


}



function checking(){


app.innerHTML=`

<div class="container">


<div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</div>

<div class="card warning">


<h2>Sicherheitsprüfung</h2>


<p>

Konto wird überprüft...

<br><br>

✓ Nutzer gefunden

<br>
✓ Zugang bestätigt

<br>
⚠ Kanalstatus unbekannt

</p>


<button onclick="found()">
Weiter
</button>


</div>


</div>

`;

}




function found(){


app.innerHTML=`

<div class="container">


<div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</div>


<div class="card warning">


<h2>⚠ Kanal gefunden</h2>


<p>

Der Kanal von Lehrer Schmidt wurde gelöscht.

<br><br>

Eine automatische Sicherung wurde gefunden.

</p>



<div class="status">

👤 Lehrer Schmidt

<br><br>

Kanal-ID:
LS-204

<br><br>

Status:
<b>Wiederherstellung erforderlich</b>

</div>


<button onclick="restore()">
Kanal wiederherstellen
</button>


<button onclick="cancel()">
Nicht wiederherstellen
</button>


</div>


</div>

`;

}




function restore(){


app.innerHTML=`

<div class="container">

<div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</div>


<h2>Wiederherstellung läuft...</h2>


<div class="progress">

<div class="bar" id="bar">

</div>

</div>


<p id="percent"
style="text-align:center;margin-top:15px">
0%
</p>


</div>

`;


let p=0;


let timer=setInterval(()=>{


p+=5;


document.getElementById("bar").style.width=p+"%";


document.getElementById("percent").innerHTML=p+"%";


if(p>=100){

clearInterval(timer);

setTimeout(done,500);

}


},120);


}




function done(){


app.innerHTML=`

<div class="container">


<div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</div>


<div class="card success">


<h2>🔓 Kanal wiederhergestellt</h2>


<p>

Die Daten wurden erfolgreich geladen.

<br><br>

Ein versteckter Upload wurde gefunden:

<br><br>

<b>
"Falls jemand diese Nachricht findet,
folgt meiner letzten Spur."
</b>

<br><br>

<b>
Hinweis: Raum 204
</b>

</p>


</div>


</div>

`;

}




function cancel(){


app.innerHTML=`

<div class="container">


<div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</div>

<div class="card danger">


<h2>❌ Abgebrochen</h2>


<p>

Die Sicherung wurde nicht geladen.

<br><br>

Automatischer Hinweis:

<br><br>

<b>
Überprüft Raum 204.
</b>

</p>


</div>


</div>

`;

}



loginPage();


</script>


</body>
</html>
